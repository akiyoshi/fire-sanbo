<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="fire" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="50%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#94a3b8" stroke-width="1">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="200" y1="0" x2="1200" y2="500"/>
    <line x1="400" y1="0" x2="1200" y2="400"/>
    <line x1="0" y1="200" x2="800" y2="630"/>
    <line x1="0" y1="400" x2="400" y2="630"/>
  </g>
  
  <!-- Fire icon -->
  <g transform="translate(100, 160)">
    <path d="M40 0C40 0 30 20 30 35C30 50 40 60 55 60C45 60 35 70 35 85C35 100 50 110 65 110C50 110 35 120 35 140C35 165 55 180 80 180C120 180 150 155 150 115C150 85 130 70 120 55C115 47 110 35 115 20C100 35 90 25 85 10C80 0 70 0 60 5C50 10 40 0 40 0Z" fill="url(#fire)" opacity="0.9"/>
  </g>
  
  <!-- Title -->
  <text x="280" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#f8fafc">FIRE参謀</text>
  
  <!-- Subtitle -->
  <text x="280" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#94a3b8">日本の税制を理解した資産シミュレーター</text>
  
  <!-- Feature pills -->
  <g transform="translate(280, 340)">
    <rect x="0" y="0" width="200" height="40" rx="20" fill="#1e3a5f" opacity="0.8"/>
    <text x="100" y="26" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#60a5fa">モンテカルロ法</text>
    
    <rect x="220" y="0" width="200" height="40" rx="20" fill="#1e3a5f" opacity="0.8"/>
    <text x="320" y="26" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#60a5fa">2026年度税制対応</text>

    <rect x="440" y="0" width="160" height="40" rx="20" fill="#1e3a5f" opacity="0.8"/>
    <text x="520" y="26" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#60a5fa">処方箋エンジン</text>
  </g>

  <!-- Bottom tagline -->
  <text x="280" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#64748b">「成功確率67%」で終わらない — 90%にする方法を逆算</text>
  
  <!-- URL -->
  <text x="280" y="530" font-family="system-ui, -apple-system, monospace" font-size="18" fill="#475569">akiyoshi.github.io/fire-sanbo</text>
  
  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#fire)"/>
</svg>
